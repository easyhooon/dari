// Compose stability configuration for Dari.
//
// Lists fully-qualified class names that the Compose compiler should treat as
// stable when inferring recomposition skipping. We use this instead of @Stable
// / @Immutable annotations because dari-core is intentionally a pure model
// module that does not depend on the Compose runtime — annotating its classes
// would force a transitive Compose dependency on consumers.
//
// All classes listed here have only stable fields (Long, String?, enums,
// Boolean), so the inference is correct in practice but invisible to the
// compiler without this hint.
//
// See: https://developer.android.com/develop/ui/compose/performance/stability/fix#configuration-file

